services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vulnsploit-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8000

  # Dev mode — hot reload (use this for development)
  frontend-dev:
    image: node:18-alpine
    container_name: vulnsploit-frontend-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://localhost:8000
    profiles:
      - dev
